{% extends "base.html" %}
{% block title %}{{ acao }} Colaborador{% endblock %}
{% block page_title %}{{ acao }} Colaborador{% endblock %}

{% block content %}
<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" placeholder="Ex: Maria Santos"
             value="{{ colaborador[1] if colaborador else '' }}" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Ex: maria@banco.com"
             value="{{ colaborador[2] if colaborador else '' }}" required>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="{{ url_for('colaboradores') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
